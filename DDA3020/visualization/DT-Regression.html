<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regression Tree Animation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 0 1px rgba(0, 0, 0, 0.04);
            padding: 28px;
            width: 650px;
            max-width: 100%;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            border: 1px solid #e8eef5;
            width: 100%;
            height: auto;
        }
        .stats {
            margin-top: 16px;
            text-align: center;
            font-size: 0.95rem;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e8eef5;
            font-weight: 600;
            color: #2c5aa0;
            letter-spacing: 0.3px;
        }
        .split-rule {
            margin-top: 10px;
            text-align: center;
            font-size: 0.85rem;
            color: #1a5f7a;
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #e8eef5;
            font-weight: 500;
            line-height: 1.5;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            letter-spacing: 0.3px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }
        button:active {
            transform: translateY(0);
        }
        button.secondary {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 0 4px 12px rgba(67, 233, 123, 0.4);
            color: #0b4d24;
        }
        button.secondary:hover {
            box-shadow: 0 6px 16px rgba(67, 233, 123, 0.5);
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="regTreeCanvas" width="550" height="350"></canvas>
    <div class="stats" id="leafStats">Initializing...</div>
    <div class="split-rule">Recursive Splitting</div>
    <div class="button-group">
        <button id="refreshBtn">Generate & Animate</button>
        <button id="replayBtn" class="secondary">Replay</button>
    </div>
</div>

<script>
    (function() {
        let currentChart = null;
        let animationTimer = null;
        
        const MAX_DEPTH = 4;
        const MIN_LEAF = 4;
        const ANIMATION_SPEED = 700;

        let currentData = [];
        let currentSnapshots = [];

        function rng(seed) {
            return function() {
                seed = (seed * 9301 + 49297) % 233280;
                return seed / 233280;
            };
        }

        function generateRandomData(n, seed, patternType) {
            let rand = rng(seed);
            let data = [];
            for (let i = 0; i < n; i++) {
                let x = 0.5 + rand() * 9.5; 
                let y;
                if (patternType === 'sine') {
                    y = 5 + 3 * Math.sin(x) + (rand() - 0.5) * 1.5;
                } else if (patternType === 'step') {
                    y = (x < 4 ? 4 : (x < 7 ? 7 : 10)) + (rand() - 0.5) * 1.2;
                } else {
                    y = 0.5 * x + 2 + (rand() - 0.5) * 1.8;
                }
                data.push({ x: x, y: y });
            }
            data.sort((a,b) => a.x - b.x);
            return data;
        }

        function sseForSegment(seg) {
            if (seg.length === 0) return 0;
            let mean = seg.reduce((s,p) => s + p.y, 0) / seg.length;
            return seg.reduce((s,p) => s + (p.y - mean) ** 2, 0);
        }

        function bestSplit(seg, minLeaf) {
            if (seg.length < 2 * minLeaf) return null;
            let bestGain = -1;
            let bestSplitVal = null;
            let bestLeft = [], bestRight = [];
            let totalSSE = sseForSegment(seg);
            if (totalSSE === 0) return null;

            for (let i = minLeaf - 1; i <= seg.length - minLeaf; i++) {
                let left = seg.slice(0, i+1);
                let right = seg.slice(i+1);
                let sseLeft = sseForSegment(left);
                let sseRight = sseForSegment(right);
                let gain = totalSSE - (sseLeft + sseRight);
                if (gain > bestGain) {
                    bestGain = gain;
                    bestSplitVal = (seg[i].x + seg[i+1].x) / 2;
                    bestLeft = left;
                    bestRight = right;
                }
            }
            if (bestGain <= 1e-6) return null;
            return { splitVal: bestSplitVal, leftSeg: bestLeft, rightSeg: bestRight };
        }

        function extractLeaves(node, leavesList = []) {
            if (!node) return leavesList;
            if (node.isLeaf) {
                leavesList.push({ 
                    xMin: node.xMin, 
                    xMax: node.xMax, 
                    yPred: node.yPred 
                });
            } else {
                extractLeaves(node.left, leavesList);
                extractLeaves(node.right, leavesList);
            }
            return leavesList;
        }

        function buildTreeSnapshots(data, minLeaf, maxDepth) {
            let points = data.map(d => ({ x: d.x, y: d.y }));
            let root = {
                isLeaf: true,
                xMin: points[0].x,
                xMax: points[points.length-1].x,
                seg: points,
                yPred: points.reduce((s,p) => s + p.y, 0) / points.length
            };

            let snapshots = [];
            snapshots.push(extractLeaves(root));

            function recurse(node, depth) {
                if (depth >= maxDepth || node.seg.length <= minLeaf) return;
                
                let split = bestSplit(node.seg, minLeaf);
                if (!split) return;

                node.isLeaf = false;
                
                let leftMean = split.leftSeg.reduce((s,p) => s + p.y, 0) / split.leftSeg.length;
                let rightMean = split.rightSeg.reduce((s,p) => s + p.y, 0) / split.rightSeg.length;

                node.left = {
                    isLeaf: true, xMin: node.xMin, xMax: split.splitVal,
                    seg: split.leftSeg, yPred: leftMean
                };
                
                node.right = {
                    isLeaf: true, xMin: split.splitVal, xMax: node.xMax,
                    seg: split.rightSeg, yPred: rightMean
                };

                snapshots.push(extractLeaves(root));

                recurse(node.left, depth + 1);
                recurse(node.right, depth + 1);
            }

            recurse(root, 0);
            return snapshots;
        }

        function updateChart(data, leaves, stepCount, totalSteps) {
            let scatterPoints = data.map(d => ({x: d.x, y: d.y}));
            let stairPoints = [];
            
            for (let leaf of leaves) {
                stairPoints.push({x: leaf.xMin, y: leaf.yPred});
                stairPoints.push({x: leaf.xMax, y: leaf.yPred});
            }
            
            let filteredStair = [];
            for (let i = 0; i < stairPoints.length; i++) {
                if (i === 0 || stairPoints[i].x !== stairPoints[i-1].x || stairPoints[i].y !== stairPoints[i-1].y) {
                    filteredStair.push(stairPoints[i]);
                }
            }

            if (!currentChart) {
                let ctx = document.getElementById('regTreeCanvas').getContext('2d');
                currentChart = new Chart(ctx, {
                    type: 'scatter',
                    data: {
                        datasets: [
                            {
                                label: 'Raw Data',
                                data: scatterPoints,
                                backgroundColor: '#3b82f6',
                                pointRadius: 5,
                                type: 'scatter',
                                order: 2
                            },
                            {
                                label: 'Tree Prediction',
                                data: filteredStair,
                                type: 'line',
                                borderColor: '#e11d48',
                                borderWidth: 3,
                                fill: false,
                                pointRadius: 0,
                                order: 1,
                                tension: 0 
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        animation: false,
                        plugins: {
                            legend: { position: 'top' },
                            tooltip: { enabled: true }
                        },
                        scales: {
                            x: { title: { display: true, text: 'X Variable' }, min: 0, max: 11 },
                            y: { title: { display: true, text: 'Y Target' }, suggestedMin: 0, suggestedMax: 12 }
                        }
                    }
                });
            } else {
                currentChart.data.datasets[0].data = scatterPoints;
                currentChart.data.datasets[1].data = filteredStair;
                currentChart.update('none'); 
            }

            let status = stepCount === totalSteps ? "(Done)" : "(Splitting...)";
            document.getElementById('leafStats').innerHTML = 
                `Progress: ${stepCount}/${totalSteps} ${status} | Leaves: ${leaves.length} | Depth: ${MAX_DEPTH}`;
        }

        function playAnimation() {
            if (animationTimer) clearInterval(animationTimer);
            if (!currentSnapshots || currentSnapshots.length === 0) return;

            let step = 0;
            let totalSteps = currentSnapshots.length;

            updateChart(currentData, currentSnapshots[step], step + 1, totalSteps);
            step++;

            animationTimer = setInterval(() => {
                if (step >= totalSteps) {
                    clearInterval(animationTimer);
                    return;
                }
                updateChart(currentData, currentSnapshots[step], step + 1, totalSteps);
                step++;
            }, ANIMATION_SPEED);
        }

        function createNewModel() {
            let patternIdx = Math.floor(Math.random() * 3);
            let patternType = ['sine', 'step', 'linear'][patternIdx];
            let seed = Date.now() + Math.random() * 10000;
            
            currentData = generateRandomData(80, seed, patternType); 
            currentSnapshots = buildTreeSnapshots(currentData, MIN_LEAF, MAX_DEPTH);
            playAnimation();
        }

        document.getElementById('refreshBtn').addEventListener('click', createNewModel);
        document.getElementById('replayBtn').addEventListener('click', playAnimation);

        createNewModel();
    })();
</script>
</body>
</html>
